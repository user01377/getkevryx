apiVersion: batch/v1
kind: CronJob
metadata:
  name: order-status
spec:
  schedule: "* * * * *"

  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2

  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120

      template:
        spec:
          imagePullSecrets:
            - name: ghcr-secret

          restartPolicy: Never

          containers:
            - name: order-status-service
              image: {{ .Values.backend.image }}
              command:
                - python
                - -u
                - -m
                - app.jobs.status_updater
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER

                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD