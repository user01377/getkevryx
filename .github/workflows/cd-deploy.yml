name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
    name: Deploy to Server
    runs-on: self-hosted

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u user01377 --password-stdin

      - name: Update Helm Chart
        run: helm upgrade kevryx ./helm \
            -f ./helm/values-prod.yaml \
            --set backend.image=ghcr.io/user01377/kevryx-backend:${{ github.event.workflow_run.head_sha }} \
            --set frontend.image=ghcr.io/user01377/kevryx-frontend:${{ github.event.workflow_run.head_sha }} \
            --atomic \
            --timeout=5m
        working-directory: /home/macser/getkevryx