name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
    name: Deploy to Server
    runs-on: self-hosted

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u user01377 --password-stdin

      - name: Pull Backend Image
        run: docker pull ghcr.io/user01377/kevryx-backend:${{ github.event.workflow_run.head_sha }}

      - name: Pull Frontend Image
        run: docker pull ghcr.io/user01377/kevryx-frontend:${{ github.event.workflow_run.head_sha }}

      - name: Remove Old Containers
        run: docker compose down --remove-orphans
        working-directory: /home/macser/getkevryx

      - name: Start Updated Stack
        run: |
          SHA=${{ github.event.workflow_run.head_sha }} docker compose up -d
        working-directory: /home/macser/getkevryx