name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target test -t kevryx-backend:test backend

      - name: Ruff
        run: docker run --rm kevryx-backend:test ruff check .

      - name: Format
        run: docker run --rm kevryx-backend:test ruff format --check .

      - name: Tests
        run: |
          docker run --rm \
            -e PYTHONPATH=/app \
            kevryx-backend:test \
            pytest -q --strict-markers

  frontend:
    name: Frontend Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build --target test -t kevryx-frontend:test frontend
    
  image-build:
    name: Building Docker Images
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Runtime Image
        run: |
          docker build \
            -t ghcr.io/user01377/kevryx-backend:${{ github.sha }} \
            -t ghcr.io/user01377/kevryx-backend:latest \
            backend

      - name: Build Frontend Runtime Image
        run: |
          docker build \
            -t ghcr.io/user01377/kevryx-frontend:${{ github.sha }} \
            -t ghcr.io/user01377/kevryx-frontend:latest \
            frontend

      - name: Push Images
        run: |
          docker push ghcr.io/user01377/kevryx-backend:${{ github.sha }}
          docker push ghcr.io/user01377/kevryx-backend:latest
          docker push ghcr.io/user01377/kevryx-frontend:${{ github.sha }}
          docker push ghcr.io/user01377/kevryx-frontend:latest