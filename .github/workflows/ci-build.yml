name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target test -t kevryx-backend:test backend

      - name: Ruff
        run: docker run --rm kevryx-backend:test ruff check .

      - name: Format
        run: docker run --rm kevryx-backend:test ruff format --check .

      - name: Tests
        run: docker run --rm kevryx-backend:test pytest -q --strict-markers

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t kevryx-frontend:test frontend