services:
  backend:
    image: "ghcr.io/user01377/kevryx-backend:${SHA:-latest}"
    ports:
      - "8000:8000"
    env_file:
      - .env

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    image: "ghcr.io/user01377/kevryx-frontend:${SHA:-latest}"
    ports:
      - "80:80"

volumes:
  postgres_data:
